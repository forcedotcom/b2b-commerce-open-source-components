            </site-product-wishlist-ui>
        </section>

    <template if:true={showItemState}>
        <section class="items">
            <site-product-wishlist-ui
                onwishlistaddtocart={handleAddItemToCart}
                onwishlistremoveitem={handleRemoveItem}
                onaddtocartclicked={handleAddToCartClicked}
                onaddtocartsuccess={handleAddToCartSuccess}
                onaddtocarterror={handleAddToCartError}
                ondeletefromwishlistclicked={handleDeleteFromWishlistClicked}
                ondeletefromwishlistsuccess={handleDeleteFromWishlistSuccess}
                ondeletefromwishlisterror={handleDeleteFromWishlistError}>
                <section slot="headerLabel">
                    <slot name="itemsHeaderLabel"></slot>
                </section>
                <section slot="headerCount">
                    <slot name="itemsHeaderCount"></slot>
                </section>
                <section slot="wishlistBody">
                    <slot name="itemsBody"></slot>
                </section>
            </site-product-wishlist-ui>
        </section>
    </template>

    <lightning-spinner
        if:true={showSpinner}
        class="wishlist-spinner"
        alternative-text={labels.alternativeSpinnerText}
        size="large"
        variant="brand"></lightning-spinner>
</template>
