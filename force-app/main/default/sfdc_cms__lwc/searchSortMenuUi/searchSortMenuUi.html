<template lwc:render-mode="light">
    <site-common-dropdown
        class="sort-menu slds-m-around_none"
        options={_options}
        selected={selectedLabel}
        ondropdownselect={handleDropdownSelect}
        menu-alignment="right"
        alternative-text={sortByAltText}></site-common-dropdown>
    <site-search-filters-panel-section
        section-id={sectionId}
        default-expanded="true"
        filter-panel-state={filterPanelState}>
        <div
            class="slot-style"
            slot="header">
            <h1
                lwc:if={isHeadingH1}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h1>
            <h2
                lwc:if={isHeadingH2}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h2>
            <h3
                lwc:if={isHeadingH3}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h3>
            <h4
                lwc:if={isHeadingH4}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h4>
            <h5
                lwc:if={isHeadingH5}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h5>
            <h6
                lwc:if={isHeadingH6}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h6>
            <p
                lwc:if={isBody}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </p>
        </div>
        <div slot="body">
            <section class={sectionClasses}>
                <lightning-radio-group
                    name={groupName}
                    class="sort-list"
                    options={_options}
                    value={activeOption.value}
                    onchange={handleChange}
                    aria-label={sortLabel}
                    type="radio"></lightning-radio-group>
            </section>
        </div>
    </site-search-filters-panel-section>
</template>
