<template lwc:render-mode="light">
    <template
        for:each={displayedValues}
        for:item="value">
        <site-search-facet-item
            show-facet-counts={showFacetCounts}
            class="input-padding"
            key={value.id}
            value={value}
            type={type}
            focus-on-init={value.focusOnInit}></site-search-facet-item>
    </template>
    <fieldset
        lwc:if={displayShowMore}
        class="slds-p-top_large">
        <site-common-button-ui
            class="show-more"
            tabindex="0"
            variant="tertiary"
            aria-label={facetAriaLabel}
            onclick={handleShowMoreOrLess}
            onkeydown={handleKeyDown}>
            {showMoreOrLessLabel}
        </site-common-button-ui>
    </fieldset>
</template>
