<template lwc:render-mode="light">
    <site-common-primitive-focus-trap-manager
        focus-id="nav-all"
        focus-trap-active={isFocusTrapEnabled}
        no-focus-next-on-disable={noFocusNextOnClose}>
        <div
            lwc:ref="rootContainer"
            aria-modal="true"
            role="dialog"
            onfocusout={handleFocusOut}
            aria-label={labels.compNameLabel}>
            <!-- Close button for mobile view -->
            <span
                lwc:if={showCloseIcon}
                class="close-button-wrapper">
                <lightning-button-icon
                    lwc:ref="closeButton"
                    class="close-button slds-m-right_small"
                    icon-name="utility:close"
                    variant="bare"
                    alternative-text={labels.closeLabel}
                    onclick={handleCloseClick}
                    onkeydown={handleAllKeyDown}></lightning-button-icon>
            </span>
            <nav
                aria-label={navMenuLabel}
                class={activeClass}>
                <ul
                    class="slide-down slds-list_vertical slds-has-flexi-truncate"
                    data-menulist
                    aria-label={navMenuLabel}
                    style={customListStyles}>
                    <li lwc:if={showBackButton}>
                        <button
                            class="slds-p-vertical_small slds-p-horizontal_large slds-truncate"
                            title={backButtonLabel}
                            data-id="back"
                            aria-expanded="true"
                            data-menulist-item
                            onclick={handleBackClick}
                            onkeydown={handleBackKeyDown}
                            onanimationend={handleAnimationEnd}
                            onmouseover={handleHoverOrFocus}
                            onfocus={handleHoverOrFocus}
                            onmouseout={handleHoverOrFocusOut}
                            onfocusout={handleHoverOrFocusOut}
                            style={customStyles}>
                            {backButtonLabel}
                            <lightning-icon
                                icon-name="utility:chevronleft"
                                variant="bare"
                                size="xx-small"
                                class="chevron-left slds-current-color slds-p-left_x-small slds-p-top_xxx-small slds-is-absolute"></lightning-icon>
                        </button>
                    </li>
                    <li lwc:if={hasProperParentItem}>
                        <a
                            class="slds-p-vertical_small slds-p-horizontal_large slds-truncate"
                            title={parentItem.label}
                            data-id={parentItem.id}
                            data-menulist-item
                            href={parentItem.href}
                            onclick={handleAllClick}
                            onkeydown={handleAllKeyDown}
                            onmouseover={handleHoverOrFocus}
                            onfocus={handleHoverOrFocus}
                            onmouseout={handleHoverOrFocusOut}
                            onfocusout={handleHoverOrFocusOut}
                            onanimationend={handleAnimationEnd}
                            style={customStyles}
                            tabindex="0">
                            {allLabel}
                        </a>
                    </li>
                    <template
                        for:each={styledVisibleItems}
                        for:item="item">
                        <li
                            key={item.id}
                            class="slds-is-relative slds-list__item">
                            <button
                                lwc:if={item.subMenu}
                                class={item.cssClasses}
                                title={item.label}
                                data-id={item.id}
                                data-menulist-item
                                aria-expanded="false"
                                aria-current={item.ariaCurrent}
                                onclick={handleParentClick}
                                onkeydown={handleParentKeyDown}
                                onanimationend={handleAnimationEnd}
                                onmouseover={handleHoverOrFocus}
                                onfocus={handleHoverOrFocus}
                                onmouseout={handleHoverOrFocusOut}
                                onfocusout={handleHoverOrFocusOut}
                                style={item.customStyles}>
                                {item.label}
                                <lightning-icon
                                    icon-name="utility:chevronright"
                                    variant="bare"
                                    size="xx-small"
                                    class="chevron-right slds-current-color slds-p-left_x-small slds-is-absolute"></lightning-icon>
                            </button>
                            <a
                                lwc:else
                                class={item.cssClasses}
                                title={item.label}
                                data-id={item.id}
                                data-menulist-item
                                href={item.href}
                                aria-label={item.ariaLabel}
                                aria-current={item.ariaCurrent}
                                onclick={handleLeafClick}
                                onkeydown={handleLeafKeyDown}
                                onanimationend={handleAnimationEnd}
                                onmouseover={handleHoverOrFocus}
                                onfocus={handleHoverOrFocus}
                                onmouseout={handleHoverOrFocusOut}
                                onfocusout={handleHoverOrFocusOut}
                                style={item.customStyles}
                                tabindex="0">
                                {item.label}
                            </a>
                        </li>
                    </template>
                </ul>
            </nav>
        </div>
    </site-common-primitive-focus-trap-manager>
</template>
