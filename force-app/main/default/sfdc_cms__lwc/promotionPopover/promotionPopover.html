<template lwc:render-mode="light">
    <experience-popup-source
        lwc:ref="popupSource"
        aria-describedby="popup-body"
        onclickout={closePopover}>
        <lightning-button-icon
            class="slds-m-horizontal_x-small"
            icon-name="utility:info"
            size="medium"
            variant="bare"
            alternative-text={popoverText}
            onclick={openPopover}
            slot="source"></lightning-button-icon>
        <lightning-button-icon
            size="small"
            class="slds-popover__close close-btn slds-float_right"
            variant="bare"
            icon-name="utility:close"
            onclick={closePopover}
            alternative-text={assistiveText}></lightning-button-icon>
        <div
            id="popup-body"
            class="slds-popover__body">
            <lightning-formatted-rich-text value={popoverText}></lightning-formatted-rich-text>
        </div>
    </experience-popup-source>
</template>
