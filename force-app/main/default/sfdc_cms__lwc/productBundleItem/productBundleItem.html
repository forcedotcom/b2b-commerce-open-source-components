<template lwc:render-mode="light">
    <site-product-bundle-item-ui
        item-url={itemUrl}
        image-url={imageUrl}
        image-alt-text={imageAltText}
        product-name={productName}
        quantity-text-with-colon={quantityTextWithColon}
        hide-quantity={hideQuantity}
        quantity={quantity}
        is-navigable={isNavigable}
        variant-attributes-field={variantAttributesField}
        product-fields-data={productFieldsData}
        currency-code={currencyCode}
        currency-code-for-item-price={currencyCodeForItemPrice}
        is-price-included-in-parent={isPriceIncludedInParent}
        is-required={isRequired}
        is-default={isDefault}
        component-group={componentGroup}
        dynamic-attributes-available-text={dynamicAttributesAvailableTextFormatted}
        is-parent-dynamic-bundle={isParentDynamicBundle}
        pricing-details={pricingDetails}
        onimageclicked={handleImageClicked}></site-product-bundle-item-ui>
</template>
