<template lwc:render-mode="light">
    <div class={cartHeaderLabelClasses}>
        <h1 class="label-count">
            <span class="slds-p-right_xx-small">
                <slot name="label"></slot>
            </span>
            <span>
                <slot name="countLabel"></slot>
            </span>
        </h1>
        <div class="clear-cart-section">
            <div
                slot="clearCart"
                data-automation="clearCart"
                onclick={handleClearCartButton}
                role="button"
                aria-label={confirmClearCartButtonText}>
                <slot name="footerClearCart"></slot>
            </div>
        </div>
    </div>
    <lightning-combobox
        class="sort-menu"
        if:true={showSortOptions}
        name="sort"
        label={sortByLabel}
        value={_sortOrder.value}
        placeholder={_sortOrder.label}
        options={sortingOptions}
        onchange={handleChangeSortSelection}
        variant="label-hidden"></lightning-combobox>
</template>
