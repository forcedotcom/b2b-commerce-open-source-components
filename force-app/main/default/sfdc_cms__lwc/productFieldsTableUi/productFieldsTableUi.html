<template lwc:render-mode="light">
    <table
        class="slds-table slds-table_header-hidden"
        role="presentation">
        <tbody>
            <template
                for:each={normalizedField}
                for:item="field">
                <tr
                    class="slds-hint-parent slds-border_bottom"
                    key={field.key}>
                    <td class="slds-cell-wrap">
                        <lightning-formatted-rich-text
                            class="slds-p-vertical_small"
                            value={field.label}></lightning-formatted-rich-text>
                    </td>
                    <td class="slds-cell-wrap">
                        <site-common-field
                            value={field.value}
                            type={field.type}
                            currency-code={currencyCode}></site-common-field>
                    </td>
                </tr>
            </template>
        </tbody>
    </table>
</template>
