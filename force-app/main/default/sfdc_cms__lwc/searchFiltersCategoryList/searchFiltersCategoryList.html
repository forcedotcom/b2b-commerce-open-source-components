<template lwc:render-mode="light">
    <site-search-filters-panel-section
        section-id={sectionId}
        default-expanded="true"
        filter-panel-state={filterPanelState}>
        <div
            class="slot-style"
            slot="header">
            <h1
                lwc:if={isHeadingH1}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h1>
            <h2
                lwc:if={isHeadingH2}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h2>
            <h3
                lwc:if={isHeadingH3}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h3>
            <h4
                lwc:if={isHeadingH4}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h4>
            <h5
                lwc:if={isHeadingH5}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h5>
            <h6
                lwc:if={isHeadingH6}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h6>
            <p
                lwc:if={isBody}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </p>
        </div>
        <div slot="body">
            <template lwc:if={showBackButton}>
                <div
                    class="parent-category"
                    style={customLinkStyles}>
                    <site-common-button-ui
                        aria-label={backButtonAssistiveText}
                        class="slds-m-left_x-small parent-item"
                        width="stretch"
                        variant="base"
                        alignment="right"
                        onclick={handleBackClick}>
                        <lightning-icon
                            icon-name="utility:chevronleft"
                            size="xx-small"></lightning-icon>
                        <template lwc:if={htmlProductNameGate}>
                            <span class="slds-m-left_x-small">{searchResultsLabel}</span>
                        </template>
                        <template lwc:else>
                            <span class="slds-m-left_x-small">{searchResultsLabel}</span>
                        </template>
                    </site-common-button-ui>
                </div>
            </template>
            <template lwc:if={showCategoryList}>
                <div class={categoryListClass}>
                    <site-common-links-list-ui
                        max-depth={maxDepth}
                        link-text-weight={linkTextWeight}
                        link-text-style={linkTextStyle}
                        text-node-tag={textNodeTag}
                        link-text-font-size={linkTextFontSize}
                        link-text-font-family={linkTextFontFamily}
                        link-color={linkColor}
                        link-hover-color={linkHoverColor}
                        link-text-align={linkTextAlign}
                        link-text-decoration={linkTextDecoration}
                        line-item-padding={lineItemPadding}
                        items={categories}></site-common-links-list-ui>
                </div>
            </template>
        </div>
    </site-search-filters-panel-section>
</template>
