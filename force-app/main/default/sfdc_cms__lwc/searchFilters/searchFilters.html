<template lwc:render-mode="light">
    <site-search-filters-ui
        class="panel-wrapper"
        show-filters={showFilters}
        search-results={filterData}
        search-term={searchTerm}
        category-name={categoryName}
        sort-rules={sortRules}
        sort-rule-id={sortRuleId}
        show-facet-counts={showFacetCounts}
        total={total}
        filter-panel-state={filterPanelState}
        onsearchsort={handleSearchSortEvent}
        onfacetvalueupdate={handleFacetValueUpdateEvent}
        onclearallfilters={handleClearAllFiltersEvent}
        oncategoryupdate={handleCategoryUpdateEvent}
        onbacktosearchupdate={handleBackToSearchUpdateEvent}
        heading-text-weight={headingTextWeight}
        heading-text-style={headingTextStyle}
        heading-text-font-size={headingTextFontSize}
        heading-text-font-family={headingTextFontFamily}
        heading-text-node-tag={headingTextNodeTag}
        heading-text-color={headingTextColor}
        heading-background-color={headingBackgroundColor}
        heading-text-align={headingTextAlign}
        heading-text-decoration={headingTextEmphasis}
        padding-vertical={paddingVertical}
        padding-horizontal={paddingHorizontal}
        max-depth={maxDepth}
        line-item-padding={lineItemPadding}
        link-text-weight={linkTextWeight}
        link-text-style={linkTextStyle}
        text-node-tag={textNodeTag}
        link-text-font-size={linkTextFontSize}
        link-text-font-family={linkTextFontFamily}
        link-color={linkColor}
        link-hover-color={linkHoverColor}
        link-text-align={linkTextAlign}
        link-text-decoration={linkTextDecoration}
        onclosefilterpanel={handleFilterPanelClose}
        onfiltersectionupdate={handleFilterSectionExpand}></site-search-filters-ui>
</template>
