<template lwc:render-mode="light">
    <site-search-filters-panel-section
        section-id={sectionId}
        filter-panel-state={filterPanelState}>
        <div
            class="slot-style"
            slot="header">
            <h1
                lwc:if={isHeadingH1}
                class={customClasses}
                style={customStyles}>
                {name}
            </h1>
            <h2
                lwc:if={isHeadingH2}
                class={customClasses}
                style={customStyles}>
                {name}
            </h2>
            <h3
                lwc:if={isHeadingH3}
                class={customClasses}
                style={customStyles}>
                {name}
            </h3>
            <h4
                lwc:if={isHeadingH4}
                class={customClasses}
                style={customStyles}>
                {name}
            </h4>
            <h5
                lwc:if={isHeadingH5}
                class={customClasses}
                style={customStyles}>
                {name}
            </h5>
            <h6
                lwc:if={isHeadingH6}
                class={customClasses}
                style={customStyles}>
                {name}
            </h6>
            <p
                lwc:if={isBody}
                class={customClasses}
                style={customStyles}>
                {name}
            </p>
        </div>
        <div slot="body">
            <site-search-price-range-facet
                lwc:if={isRangeType}
                currency-code={currencyCode}
                min-limit={minLimit}
                max-limit={maxLimit}
                min-price={minPrice}
                max-price={maxPrice}></site-search-price-range-facet>
            <site-search-input-facet
                lwc:else
                show-facet-counts={showFacetCounts}
                facet-name={name}
                values={values}
                type={type}
                onfacetvaluetoggle={handleFacetToggle}></site-search-input-facet>
        </div>
    </site-search-filters-panel-section>
</template>
