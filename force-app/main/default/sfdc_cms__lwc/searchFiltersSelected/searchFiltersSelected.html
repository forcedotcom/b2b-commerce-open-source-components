<template lwc:render-mode="light">
    <site-search-filters-panel-section
        section-id={sectionId}
        default-expanded="true"
        filter-panel-state={filterPanelState}>
        <div
            class="slot-style"
            slot="header">
            <h1
                lwc:if={isHeadingH1}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h1>
            <h2
                lwc:if={isHeadingH2}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h2>
            <h3
                lwc:if={isHeadingH3}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h3>
            <h4
                lwc:if={isHeadingH4}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h4>
            <h5
                lwc:if={isHeadingH5}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h5>
            <h6
                lwc:if={isHeadingH6}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </h6>
            <p
                lwc:if={isBody}
                class={customClasses}
                style={customStyles}>
                {sectionHeader}
            </p>
        </div>
        <div slot="body">
            <ul
                class="slds-p-bottom_x-small slds-listbox slds-listbox_horizontal"
                aria-label={sectionHeader}>
                <template
                    for:each={selectedFilters}
                    for:item="filter">
                    <li
                        key={filter.id}
                        class="selected-filter">
                        <site-common-pill
                            pill-data={filter}
                            label-text={filter.name}
                            show-remove-button="true"
                            onremovepill={handleRemoveFilter}></site-common-pill>
                    </li>
                </template>
            </ul>
        </div>
    </site-search-filters-panel-section>
</template>
