<template lwc:render-mode="light">
    <site-product-list-purchased-filterange
        sort-menu-label={sortMenuLabel}
        onfilterrangechange={handleFilterRangeChange}></site-product-list-purchased-filterange>
    <div lwc:if={showEmptyState}>
        <div class="slds-p-vertical_small image-svg">
            <img
                src={svg}
                alt />
        </div>
        <slot name="emptyBody"></slot>
    </div>
    <div
        lwc:if={hasError}
        class="slds-m-around_medium slds-text-align_center">
        <lightning-icon
            aria-hidden="true"
            src={warningIconPath}
            size="large"
            class="slds-m-bottom_large"
            data-automation="warning-icon"></lightning-icon>
        <h3 class="slds-text-heading_large slds-m-bottom_small">{errorHeading}</h3>
        <h5>
            <lightning-formatted-rich-text value={errorDescription}></lightning-formatted-rich-text>
        </h5>
    </div>
    <slot name="purchasedProductsRepeater"></slot>
    <lightning-spinner
        lwc:if={showSpinner}
        class="spinner"
        alternative-text={alternativeSpinnerText}
        size="large"
        variant="brand"></lightning-spinner>
</template>
