<template lwc:render-mode="light">
    <div class="slds-grid slds-grid_vertical-align-center">
        <div class="slds-col">
            <button
                class="slds-float_right sort-filter-button"
                title={sortAndFilterLabel}
                onclick={handleShowFilterSortPanel}
                aria-label={sortAndFilterPanelAriaLabel}
                aria-haspopup="dialog">
                {sortAndFilterLabel}
            </button>
        </div>
        <div class="slds-col sort-menu-dropdown">
            <slot name="sortMenuLabel"></slot>
        </div>
        <div class="slds-col slds-m-left_xx-small sort-menu-dropdown">
            <site-search-sort-menu-ui
                group-name="header"
                sort-rules={sortRules}
                sort-rule-id={sortRuleId}
                onsearchsort={handleSearchSortEvent}></site-search-sort-menu-ui>
        </div>
    </div>
</template>
