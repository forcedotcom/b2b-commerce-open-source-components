<template lwc:render-mode="light">
    <div class={formBorderClass}>
        <template if:true={showBackToListLink}>
            <div class="slds-m-bottom_small">
                <lightning-button
                    data-back-to-list-link
                    icon-name="utility:chevronleft"
                    variant="base"
                    label={backToListLabel}
                    onclick={handleCloseNewAddressFormClicked}></lightning-button>
            </div>
        </template>
        <h3
            if:false={isNewAddressMode}
            class="address-header slds-text-heading_small">
            <span>{componentHeaderEditAddressLabel}</span>
        </h3>
        <template if:true={showPersonName}>
            <!-- ---------------------------------------------------- -->
            <!-- Some countries display last name before first name.  -->
            <!-- Getter lastNameFirst determines this information.    -->
            <!-- If the getter lastNameFirst returns true,            -->
            <!-- last name field is displayed first.                  -->
            <!-- ---------------------------------------------------- -->
            <div class="slds-form-element__row name-fields">
                <lightning-input
                    if:true={isLastNameFirst}
                    data-lastname-field
                    data-validate
                    read-only={disabled}
                    class="slds-size_1-of-2 name-field"
                    label={labels.lastNameLabel}
                    name="lastname"
                    autocomplete="family-name"
                    oncommit={handleLastNameChange}
                    required
                    value={lastName}
                    lwc:ref="lastNameFieldFirst"></lightning-input>
                <lightning-input
                    data-firstname-field
                    data-validate
                    read-only={disabled}
                    class="slds-size_1-of-2 name-field"
                    label={labels.firstNameLabel}
                    name="firstname"
                    autocomplete="given-name"
                    oncommit={handleFirstNameChange}
                    required
                    value={firstName}
                    lwc:ref="firstNameField"></lightning-input>
                <lightning-input
                    if:false={isLastNameFirst}
                    data-lastname-field
                    data-validate
                    read-only={disabled}
                    class="slds-size_1-of-2 name-field"
                    label={labels.lastNameLabel}
                    name="lastname"
                    autocomplete="family-name"
                    oncommit={handleLastNameChange}
                    required
                    value={lastName}></lightning-input>
            </div>
        </template>
        <template if:true={showCompanyName}>
            <lightning-input
                data-companyname-field
                data-validate
                read-only={disabled}
                label={labels.companyNameLabel}
                name="companyName"
                autocomplete="organization"
                oncommit={handleCompanyNameChange}
                value={companyName}></lightning-input>
        </template>
        <!-- lightning-input-address has a number of deficiencies:
            1. Country comes at the top to emulate behaviour in Aloha
            2. Country isn't a "required" field
            3. One can select "--None--" as a country
            4. It comes with its own fieldset / legend and may be confusing since we'd have another fieldset on top of it
            with the name added
            5. Doesn't allow setting focus on the first invalid element
            6. Order of the fields would change depending on a user's _salesforce_ locale
            7. It's a heavy component, bringing in many dependencies (autocompletes, dual listboxes, native and desktop selects, etc)
            8. It doesn't support disabled options (for example to have separators in the list of countries between
            most used countries given a region and the rest)
            9. Layout of the fields is not optimal for mobile (states text gets cut off)
        -->
        <lightning-input-address
            show-address-lookup={showAddressLookup}
            show-compact-address
            country-disabled={disableCountryDropdown}
            required
            read-only={disabled}
            city={city}
            city-label={labels.cityLabel}
            country={country}
            country-label={labels.countryLabel}
            country-options={countryOptions}
            data-address-fields
            data-validate
            onchange={handleAddressChange}
            postal-code={postalCode}
            postal-code-label={labels.postalCodeLabel}
            province={province}
            province-label={labels.provinceLabel}
            province-options={provinceOptions}
            street={_streetAddress}
            street-label={labels.addressLineOneLabel}
            subpremise={_subpremise}
            subpremise-label={labels.addressLineTwoLabel}
            variant="label-hidden"
            locale={customLocale}
            street-placeholder=""></lightning-input-address>

        <template lwc:if={showPhoneNumber}>
            <template lwc:if={skipPhoneNumberValidationEnabled}>
                <lightning-input
                    data-validate
                    data-phonenumber
                    read-only={disabled}
                    placeholder={phoneNumberPlaceholderText}
                    label={phoneNumberLabel}
                    type="tel"
                    name="phonenumber"
                    autocomplete="tel"
                    oncommit={handlePhoneNumberChange}
                    required={phoneNumberRequired}
                    value={phoneNumber}
                    id="phone-number-field"
                    minlength="3"
                    maxlength="40"
                    pattern="^[0-9\s\-\(\)\.\/\+]*$"></lightning-input>
            </template>
            <template lwc:else>
                <site-checkout-multi-country-phone-field
                    data-validate
                    phone-number-label={phoneNumberLabel}
                    phone-number-placeholder-text={phoneNumberPlaceholderText}
                    raw-internationalization-data={rawInternationalizationDataPhone}
                    country={country}
                    phone-number={phoneNumber}
                    phone-number-required={phoneNumberRequired}
                    read-only={disabled}
                    oncommit={handlePhoneNumberChange}></site-checkout-multi-country-phone-field>
            </template>
        </template>

        <template if:true={showDefaultAddress}>
            <lightning-input
                data-default-address-checkbox
                disabled={isDefaultDisabled}
                label={makeDefaultAddressLabel}
                type="checkbox"
                onchange={handleIsDefaultAddressChange}
                checked={isDefaultAddress}></lightning-input>
        </template>
    </div>
</template>
