<template lwc:render-mode="light">
    <site-common-record-link
        if:true={isLink}
        record-id={recordId}
        label={valueOfNameField}
        object-api-name={_objectApiName}></site-common-record-link>
    <lightning-formatted-rich-text
        if:false={isLink}
        value={valueOfNameField}></lightning-formatted-rich-text>
</template>
